spring:
  application:
    name: bookstore

  datasource:
    url: jdbc:postgresql://localhost:5432/bookstore
    username: bookstore
    password: bookstore
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# URL внешнего ISBN-сервиса (Google Books API)
isbn:
  service:
    url: https://www.googleapis.com/books/v1

notification:
  service:
    url: http://notification-service:8081
