spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

isbn:
  service:
    url: http://localhost:9999   # будет переопределён WireMock

notification:
  service:
    url: http://localhost:9998   # будет переопределён WireMock / MockBean
